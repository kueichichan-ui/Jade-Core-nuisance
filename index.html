<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>300公尺鄰避設施查核工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f2f1ed;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9a9994;
    --red-bg: #fcebeb; --red-text: #a32d2d; --red-border: #f09595;
    --amber-bg: #faeeda; --amber-text: #854f0b; --amber-border: #ef9f27;
    --green-bg: #eaf3de; --green-text: #3b6d11; --green-border: #97c459;
    --blue-bg: #e6f1fb; --blue-text: #185fa5; --blue-border: #85b7eb;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #262624; --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0ede6; --text2: #a8a59e; --text3: #6b6862;
      --red-bg: #3a1a1a; --red-text: #f09595; --red-border: #7a2a2a;
      --amber-bg: #2e2010; --amber-text: #fac775; --amber-border: #7a5010;
      --green-bg: #1a2e10; --green-text: #c0dd97; --green-border: #3a6a18;
      --blue-bg: #101e2e; --blue-text: #b5d4f4; --blue-border: #18407a;
    }
  }

  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: var(--text); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--bg); font-size: 18px; flex-shrink: 0; }
  header h1 { font-size: 17px; font-weight: 500; }
  header p { font-size: 13px; color: var(--text2); margin-top: 1px; }

  .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem; }

  .search-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .search-row input { flex: 1; font-size: 15px; padding: 11px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); }
  .search-row input:focus { outline: none; border-color: var(--text2); }
  .search-row button { font-size: 14px; padding: 11px 20px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; white-space: nowrap; font-weight: 500; }
  .search-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .search-row button:not(:disabled):hover { opacity: 0.85; }

  .status { display: none; background: var(--surface2); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 14px; color: var(--text2); align-items: center; gap: 10px; }
  .status.err { background: var(--red-bg); color: var(--red-text); }
  .spinner { width: 16px; height: 16px; flex-shrink: 0; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary { display: none; }
  .area-desc { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 500; }
  .metric-value.red { color: var(--red-text); }
  .metric-value.amber { color: var(--amber-text); }
  .metric-value.green { color: var(--green-text); }

  .section-label { font-size: 12px; font-weight: 500; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
  .results { display: flex; flex-direction: column; gap: 8px; }

  .fcard { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .fcard-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
  .fname { font-size: 15px; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500; flex-shrink: 0; }
  .badge.red { background: var(--red-bg); color: var(--red-text); }
  .badge.amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge.green { background: var(--green-bg); color: var(--green-text); }
  .freason { font-size: 13px; color: var(--text2); margin-bottom: 8px; line-height: 1.55; }
  .fnote { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .flinks { display: flex; flex-wrap: wrap; gap: 6px; }
  .flink { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); color: var(--blue-text); text-decoration: none; background: var(--blue-bg); display: inline-block; }
  .flink:hover { opacity: 0.8; }

  .disclaimer { font-size: 12px; color: var(--text3); margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border); line-height: 1.7; }

  @media (max-width: 500px) { header { padding: 1rem; } .main { padding: 1.25rem 1rem; } }
</style>
</head>
<body>

<header>
  <div class="logo">🏠</div>
  <div>
    <h1>300公尺鄰避設施查核工具</h1>
    <p>輸入地址，AI 協助評估周邊鄰避設施風險並提供官方查詢連結</p>
  </div>
</header>

<div class="main">
  <div class="search-row">
    <input type="text" id="addr-input" placeholder="輸入完整地址，例如：台北市信義區信義路五段7號" />
    <button id="search-btn" onclick="doSearch()">查詢 →</button>
  </div>

  <div class="status" id="status"></div>

  <div class="summary" id="summary">
    <div class="area-desc" id="area-desc"></div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">需查核</div><div class="metric-value red" id="m-risk">—</div></div>
      <div class="metric"><div class="metric-label">建議確認</div><div class="metric-value amber" id="m-check">—</div></div>
      <div class="metric"><div class="metric-label">機率低</div><div class="metric-value green" id="m-ok">—</div></div>
    </div>
    <div class="section-label">各類設施查核結果</div>
    <div class="results" id="results"></div>
    <div class="disclaimer">本工具透過 AI 協助分析，結果僅供初步參考。各查詢網站資料可能未即時更新，高壓電塔、私人墳墓等設施公開資料有限，正式評估請搭配實地現勘與專業鑑定。</div>
  </div>
</div>

<script>
const FACILITIES = [
  { name: "市場", urls: [{ label: "樂活市集", url: "https://www.cto.moea.gov.tw/Market/" }, { label: "TGOS Maps", url: "https://map.tgos.tw/" }] },
  { name: "超市", urls: [{ label: "TGOS Maps", url: "https://map.tgos.tw/" }] },
  { name: "學校", urls: [{ label: "國土測繪圖資", url: "https://maps.nlsc.gov.tw/" }] },
  { name: "警察機關", urls: [{ label: "警察機關查詢", url: "https://www.npa.gov.tw/ch/app/data/list?id=1820&module=liaison" }] },
  { name: "行政機關", urls: [{ label: "TGOS Maps", url: "https://map.tgos.tw/" }] },
  { name: "體育場", urls: [{ label: "iPlay 全國運動場館", url: "https://iplay.sports.gov.tw/GymSearch/SearchQuery" }] },
  { name: "醫院", urls: [{ label: "衛福部醫事查詢", url: "https://ma.mohw.gov.tw/Accessibility/BASSearch/MASearchBAS" }, { label: "健保特約查詢", url: "https://info.nhi.gov.tw/INAE1000/INAE1000S01" }] },
  { name: "飛機場", urls: [{ label: "民航局機場分佈", url: "https://www.caa.gov.tw/Article.aspx?a=982&lang=1" }] },
  { name: "變電所", urls: [{ label: "台電變電所資訊", url: "https://www.taipower.com.tw/2289/2406/2420/2431/simpleList" }, { label: "台電電網分布圖", url: "https://www.taipower.com.tw/2289/2339/2344/simpleList" }] },
  { name: "高壓電塔（線）", urls: [{ label: "台電電網分布圖", url: "https://www.taipower.com.tw/2289/2339/2344/simpleList" }], note: "公開資料以電網分布為主，建議搭配現勘確認" },
  { name: "寺廟", urls: [{ label: "全國宗教資訊網", url: "https://religion.moi.gov.tw/Religion/FoundationTemple?ci=1" }] },
  { name: "殯儀館", urls: [{ label: "全國殯葬資訊入口網", url: "https://mort.moi.gov.tw/" }] },
  { name: "公墓", urls: [{ label: "全國殯葬資訊入口網", url: "https://mort.moi.gov.tw/" }] },
  { name: "火化場", urls: [{ label: "全國殯葬資訊入口網", url: "https://mort.moi.gov.tw/" }] },
  { name: "骨灰存放設施", urls: [{ label: "全國殯葬資訊入口網", url: "https://mort.moi.gov.tw/" }] },
  { name: "垃圾場／焚化爐", urls: [{ label: "公有掩埋場系統", url: "https://landfill.moenv.gov.tw/" }, { label: "焚化爐位置圖", url: "https://data.gov.tw/dataset/6389" }] },
  { name: "私人墳墓", urls: [{ label: "全國殯葬資訊入口網", url: "https://mort.moi.gov.tw/" }, { label: "國土測繪圖資", url: "https://maps.nlsc.gov.tw/" }], note: "未必有完整圖層，建議搭配現勘" },
  { name: "加油（氣）站", urls: [{ label: "加油站位置", url: "https://www2.moeaea.gov.tw/oil111/Dealer/GasStations" }, { label: "加氣站位置", url: "https://www2.moeaea.gov.tw/oil111/Dealer/LPGCStations" }] },
  { name: "瓦斯行（場）", urls: [{ label: "液化石油氣經銷商", url: "https://www2.moeaea.gov.tw/oil111/Dealer/LPGDealer" }, { label: "液化石油氣分裝場", url: "https://www2.moeaea.gov.tw/oil111/Dealer/LPGSubPackaging" }] },
  { name: "葬儀社", urls: [{ label: "全國殯葬資訊入口網", url: "https://mort.moi.gov.tw/" }] },
];

async function doSearch() {
  const addr = document.getElementById('addr-input').value.trim();
  if (!addr) return;

  const statusEl = document.getElementById('status');
  const summaryEl = document.getElementById('summary');
  const btn = document.getElementById('search-btn');

  statusEl.style.display = 'flex';
  statusEl.className = 'status';
  statusEl.innerHTML = '<div class="spinner"></div><span>AI 分析中，請稍候...</span>';
  summaryEl.style.display = 'none';
  btn.disabled = true;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address: addr })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const parsed = await res.json();
    renderResults(addr, parsed);
    statusEl.style.display = 'none';
    summaryEl.style.display = 'block';
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.innerHTML = `分析失敗：${e.message || '請稍後再試。'}`;
  }

  btn.disabled = false;
}

function renderResults(addr, parsed) {
  document.getElementById('area-desc').innerHTML =
    `查詢地址：<strong>${parsed.address_parsed || addr}</strong>　｜　${parsed.area_description || ''}`;

  const map = {};
  (parsed.facilities || []).forEach(f => { map[f.name] = f; });

  let risk = 0, check = 0, ok = 0;
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  FACILITIES.forEach(fac => {
    const ai = map[fac.name] || {};
    const r = ai.risk || 'medium';
    if (r === 'high') risk++;
    else if (r === 'medium') check++;
    else ok++;

    const badgeClass = r === 'high' ? 'red' : r === 'low' ? 'green' : 'amber';
    const badgeText = r === 'high' ? '需查核' : r === 'low' ? '機率低' : '建議確認';

    const linksHtml = fac.urls.map(u =>
      `<a class="flink" href="${u.url}" target="_blank" rel="noopener">${u.label} ↗</a>`
    ).join('');

    const card = document.createElement('div');
    card.className = 'fcard';
    card.innerHTML = `
      <div class="fcard-top">
        <div class="fname">${fac.name}</div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="freason">${ai.reason || '建議至以下官方網站查詢確認'}</div>
      ${fac.note ? `<div class="fnote">${fac.note}</div>` : ''}
      <div class="flinks">${linksHtml}</div>
    `;
    resultsEl.appendChild(card);
  });

  document.getElementById('m-risk').textContent = risk;
  document.getElementById('m-check').textContent = check;
  document.getElementById('m-ok').textContent = ok;
}

document.getElementById('addr-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
